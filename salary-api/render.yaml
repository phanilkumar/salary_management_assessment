databases:
  - name: salary-management-db
    databaseName: salary_management_production
    plan: free

services:
  - type: web
    name: salary-management-api
    env: ruby
    plan: free
    rootDir: salary-api
    buildCommand: bundle install
    startCommand: bundle exec rails db:migrate && bundle exec rails db:seed && bundle exec puma -C config/puma.rb
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: salary-management-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
